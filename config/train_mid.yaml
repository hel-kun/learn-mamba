dataset:
  name: SimpleStories/SimpleStories-JA
  config_name: null
  text_column: story
  max_train_samples: null
  max_eval_samples: 1000

tokenizer:
  name: EleutherAI/gpt-neox-20b

model:
  d_model: 256
  d_state: 16
  d_conv: 4
  dt_rank: null
  num_layers: 8
  dropout: 0.1
  expand: 2
  tie_embeddings: true
  block_size: 1024

training:
  batch_size: 32
  max_steps: 50000
  learning_rate: 1e-4
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 100
  eval_batches: 4

runtime:
  device: "cuda:3"
  seed: 0

output:
  checkpoint_path: checkpoints/mid/mamba_lm2.pt
